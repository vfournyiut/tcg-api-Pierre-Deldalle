paths:
  /api/auth/sign-up:
    post:
      tags:
        - Authentication
      summary: Inscription d'un nouvel utilisateur
      description: Crée un nouveau compte utilisateur et retourne un token JWT valide 7 jours
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - username
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "alice@example.com"
                username:
                  type: string
                  example: "Alice"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        "201":
          description: Inscription réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Inscription réussie"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Données manquantes ou invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Données manquantes / invalides"
        "409":
          description: Email déjà utilisé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Email incorrecte"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"

  /api/auth/sign-in:
    post:
      tags:
        - Authentication
      summary: Connexion d'un utilisateur existant
      description: Authentifie un utilisateur avec son email et mot de passe, retourne un token JWT valide 7 jours
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "alice@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Connexion réussie"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Données manquantes ou invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Données manquantes / invalides"
        "401":
          description: Email ou mot de passe incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Email ou mot de passe incorrect"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"
