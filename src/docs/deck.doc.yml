paths:
  /api/decks:
    post:
      tags:
        - Decks
      summary: Créer un nouveau deck
      description: Crée un deck avec exactement 10 cartes pour l'utilisateur authentifié
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - cards
              properties:
                name:
                  type: string
                  example: "Mon deck électrique"
                cards:
                  type: array
                  items:
                    type: integer
                  minItems: 10
                  maxItems: 10
                  description: Tableau de 10 numéros de Pokédex
                  example: [1, 4, 7, 25, 39, 52, 63, 74, 92, 129]
      responses:
        "201":
          description: Deck créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck créé avec succès"
                  deck:
                    $ref: "#/components/schemas/Deck"
        "400":
          description: Données invalides (nom manquant, pas exactement 10 cartes, ou numéros invalides)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                nom_manquant:
                  summary: Nom du deck manquant
                  value:
                    error: "Nom du deck manquant"
                cartes_invalides:
                  summary: Nombre de cartes incorrect
                  value:
                    error: "Le deck ne possède pas exactement 10 cartes"
                pokedex_invalide:
                  summary: Numéro de Pokédex invalide
                  value:
                    error: "Un ou plusieurs id des pokémons du deck sont invalides"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Token manquant / invalide"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"

  /api/decks/mine:
    get:
      tags:
        - Decks
      summary: Récupérer mes decks
      description: Retourne tous les decks appartenant à l'utilisateur authentifié, avec leurs cartes associées
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des decks de l'utilisateur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deck"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Token manquant / invalide"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"

  /api/decks/{id}:
    get:
      tags:
        - Decks
      summary: Récupérer un deck par son ID
      description: Retourne un deck spécifique appartenant à l'utilisateur authentifié avec ses cartes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identifiant du deck
          example: 1
      responses:
        "200":
          description: Deck trouvé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Token manquant / invalide"
        "403":
          description: L'utilisateur n'est pas propriétaire du deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Accès interdit"
        "404":
          description: Deck introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Deck inexistant"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"

    patch:
      tags:
        - Decks
      summary: Modifier un deck
      description: Modifie le nom et/ou les cartes d'un deck appartenant à l'utilisateur authentifié. Au moins un champ doit être fourni. Si les cartes sont modifiées, exactement 10 cartes doivent être fournies.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identifiant du deck à modifier
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Mon deck modifié"
                cards:
                  type: array
                  items:
                    type: integer
                  minItems: 10
                  maxItems: 10
                  description: Tableau de 10 IDs de cartes (remplace les cartes existantes)
                  example: [1, 4, 7, 25, 39, 52, 63, 74, 92, 130]
      responses:
        "200":
          description: Deck modifié avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck modifié avec succès"
                  deck:
                    $ref: "#/components/schemas/Deck"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                aucun_champ:
                  summary: Aucun champ à modifier
                  value:
                    error: "Aucun champ à modifier"
                cartes_invalides:
                  summary: Nombre de cartes incorrect
                  value:
                    error: "Le deck doit contenir exactement 10 cartes"
                ids_invalides:
                  summary: IDs de cartes invalides
                  value:
                    error: "Un ou plusieurs id des pokémons du deck sont invalides"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Token manquant / invalide"
        "403":
          description: L'utilisateur n'est pas propriétaire du deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Accès interdit"
        "404":
          description: Deck introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Deck inexistant"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"

    delete:
      tags:
        - Decks
      summary: Supprimer un deck
      description: Supprime définitivement un deck et toutes ses associations cartes/deck. L'utilisateur doit être propriétaire du deck.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Identifiant du deck à supprimer
          example: 1
      responses:
        "200":
          description: Deck supprimé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Deck supprimé avec succès"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Token manquant / invalide"
        "403":
          description: L'utilisateur n'est pas propriétaire du deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Accès interdit"
        "404":
          description: Deck introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Deck inexistant"
        "500":
          description: Erreur serveur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Erreur serveur"
